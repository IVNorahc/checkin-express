name: Daily Trial Notifications

on:
  schedule:
    - cron: '0 8 * * *'   # Chaque jour à 8h00 UTC
  workflow_dispatch:       # Déclenchement manuel depuis GitHub Actions

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Send trial notifications
        run: |
          response=$(curl --fail --silent --show-error --location \
            --request POST \
            'https://kcrwbjhtofyoojjamoaz.supabase.co/functions/v1/send-notifications' \
            --header 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
            --header 'Content-Type: application/json' \
            --data '{}')
          echo "Response: $response"
          echo "$response" | grep -q '"success":true' && echo "✅ Notifications sent" || echo "⚠️ Check response above"
